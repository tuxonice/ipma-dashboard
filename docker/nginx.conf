server {
    listen 80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Security headers (HSTS intentionally omitted: this config is dev-only HTTP).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Defence in depth: never serve dotfiles (e.g. accidental .env in webroot).
    location ~ /\. {
        deny all;
    }

    # Serve static assets directly, fall back to the front controller.
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Route all PHP execution to the single front controller.
    location ~ ^/index\.php(/|$) {
        fastcgi_pass app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    # Deny direct access to any other PHP file for safety.
    location ~ \.php$ {
        return 404;
    }

    client_max_body_size 8m;
}
