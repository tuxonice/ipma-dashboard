    section_data_body: "Os dados meteorológicos, oceanográficos, sísmicos e climáticos são fornecidos pelo <a href=\"https://www.ipma.pt/\" target=\"_blank\" rel=\"noopener\">Instituto Português do Mar e da Atmosfera (IPMA)</a>. Este painel não é afiliado nem aprovado pelo IPMA."
    section_astronomical_title: "Dados astronómicos"
    section_astronomical_body: "Os dados de sol e lua (horas de nascer/pôr, posições solar e lunar, fase e iluminação da lua) são calculados localmente com recurso à biblioteca open-source <a href=\"https://github.com/tuxonice/suncalc-php\" target=\"_blank\" rel=\"noopener\">tuxonice/suncalc-php</a>, uma adaptação em PHP de <a href=\"https://github.com/mourner/suncalc\" target=\"_blank\" rel=\"noopener\">suncalc de Vladimir Agafonkin</a>. Estes dados não provêm da API do IPMA."
    section_accuracy_title: "Exactidão da informação"
    section_accuracy_body: "As informações são apresentadas tal como recebidas da API do IPMA. Não garantimos a exactidão, integridade ou atualidade dos dados. Para decisões críticas, consulte sempre as fontes oficiais do IPMA."
    section_liability_title: "Limitação de responsabilidade"
    section_liability_body: "Este serviço é disponibilizado sem qualquer garantia. Não nos responsabilizamos por danos directos ou indirectos resultantes da utilização ou indisponibilidade deste painel."
    section_cookies_title: "Cookies"
    section_cookies_body: "Este sítio utiliza apenas cookies funcionais para guardar preferências de idioma. Não são utilizados cookies de rastreamento nem de terceiros para fins publicitários."
    section_attribution_title: "Atribuição da fonte"
    section_attribution_body: "Conforme exigido pelo IPMA, qualquer reutilização dos dados apresentados neste painel deve referir sempre a fonte de informação: <a href=\"https://www.ipma.pt/\" target=\"_blank\" rel=\"noopener\">Instituto Português do Mar e da Atmosfera (IPMA)</a>. Para consultar os termos completos do IPMA, visite <a href=\"https://api.ipma.pt/#legal\" target=\"_blank\" rel=\"noopener\">api.ipma.pt — termos e condições</a>."
    section_copyright_title: "Direitos de autor e utilização não comercial"
    section_copyright_body: "O conteúdo disponibilizado pelo IPMA é protegido por Direitos de Autor ao abrigo da legislação portuguesa e da União Europeia. A informação pode ser copiada e utilizada gratuitamente para uso pessoal ou público, desde que dessa utilização <strong>não decorram finalidades lucrativas ou ofensivas</strong>. A utilização comercial dos dados requer autorização prévia do IPMA."
    section_privacy_title: "Privacidade"
    section_privacy_body: "Este sítio não recolhe dados pessoais. Não são utilizados formulários de registo, contas de utilizador nem ferramentas de análise que identifiquem visitantes. O único cookie armazenado serve para guardar a preferência de idioma."
    section_changes_title: "Alterações aos termos"
    section_changes_body: "Estes termos podem ser atualizados a qualquer momento. A utilização continuada do serviço após alterações implica a aceitação dos novos termos."

