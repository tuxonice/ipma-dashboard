terms:
    title: "Terms and conditions · Weather Dashboard"
    heading: "Terms and conditions"
    last_updated: "Last updated: %date%"
    section_usage_title: "Use of the service"
    section_usage_body: "This dashboard displays meteorological, oceanographic, seismic and climate data obtained via the <a href=\"https://api.ipma.pt/\" target=\"_blank\" rel=\"noopener\">IPMA Open API</a>. Usage is free for personal and informational purposes."
    section_data_title: "Data source"
    section_data_body: "Meteorological, oceanographic, seismic and climate data is provided by the <a href=\"https://www.ipma.pt/\" target=\"_blank\" rel=\"noopener\">Portuguese Institute for Sea and Atmosphere (IPMA)</a>. This dashboard is not affiliated with or endorsed by IPMA."
    section_astronomical_title: "Astronomical data"
    section_astronomical_body: "Sun and moon data (rise/set times, solar and lunar positions, moon phase and illumination) is calculated locally using the open-source <a href=\"https://github.com/tuxonice/suncalc-php\" target=\"_blank\" rel=\"noopener\">tuxonice/suncalc-php</a> library, a PHP port of <a href=\"https://github.com/mourner/suncalc\" target=\"_blank\" rel=\"noopener\">Vladimir Agafonkin's suncalc</a>. This data is not sourced from the IPMA API."
    section_accuracy_title: "Accuracy of information"
    section_accuracy_body: "Information is presented as received from the IPMA API. We do not guarantee the accuracy, completeness or timeliness of the data. For critical decisions, always refer to official IPMA sources."
    section_liability_title: "Limitation of liability"
    section_liability_body: "This service is provided as-is without any warranty. We are not liable for any direct or indirect damages resulting from the use or unavailability of this dashboard."
    section_cookies_title: "Cookies"
    section_cookies_body: "This site uses only functional cookies to save language preferences. No tracking or third-party advertising cookies are used."
    section_attribution_title: "Source attribution"
    section_attribution_body: "As required by IPMA, any reuse of data presented on this dashboard must always cite the source: <a href=\"https://www.ipma.pt/\" target=\"_blank\" rel=\"noopener\">Instituto Português do Mar e da Atmosfera (IPMA)</a>. For IPMA's full terms, see <a href=\"https://api.ipma.pt/#legal\" target=\"_blank\" rel=\"noopener\">api.ipma.pt — terms and conditions</a>."
    section_copyright_title: "Copyright and non-commercial use"
    section_copyright_body: "Content provided by IPMA is protected by copyright under Portuguese and EU law. Information may be freely copied and used for personal or public purposes, provided that such use is <strong>not for profit or offensive purposes</strong>. Commercial use of the data requires prior authorisation from IPMA."
    section_privacy_title: "Privacy"
    section_privacy_body: "This site does not collect personal data. There are no registration forms, user accounts or analytics tools that identify visitors. The only cookie stored is used to save your language preference."
    section_changes_title: "Changes to these terms"
    section_changes_body: "These terms may be updated at any time. Continued use of the service after changes constitutes acceptance of the new terms."

