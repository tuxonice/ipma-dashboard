# Local development stack for the IPMA Dashboard.
# Run `docker compose up --build` to start the app on http://localhost:8080
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ipma-dashboard-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:cached
    expose:
      - "9000"

  web:
    image: nginx:1.27-alpine
    container_name: ipma-dashboard-web
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:cached
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
